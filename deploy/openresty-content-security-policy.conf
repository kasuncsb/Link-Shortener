# Replace your existing Content-Security-Policy add_header with the line below.
# The sha256 hash allows the small inline script used by the bundled lottie-player
# web component (see browser console if you upgrade lottie-player and CSP blocks again).
#
# If an extension (e.g. AdGuard) injects scripts, the console may show an effective
# script-src that includes hosts like local.adguard.org; that is from the extension,
# not this server.

add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net 'sha256-TRBMG+1QnKrIA7W9r+28JVH2wwsv0RxNDHtc3jmpngo='; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self'; frame-ancestors 'self';" always;
